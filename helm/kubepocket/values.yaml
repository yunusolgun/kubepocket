# helm/kubepocket/values.yaml
# KubePocket v3.0.0

# =============================================
# License Key
# Boş bırakılırsa Free tier (3 namespace, 1 cluster)
# Satın alınan key buraya veya KUBEPOCKET_LICENSE_KEY
# environment variable olarak geçilebilir.
# =============================================
licenseKey: ""

replicaCount: 1

image:
  repository: kubepocket/kubepocket
  tag: 3.0.0
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

clusterName: "default"
allowedOrigins: "http://localhost:3000"
logLevel: INFO

collector:
  interval: 300
  logLevel: INFO
  statsInterval: 3600

anomaly:
  enabled: true
  zScoreThreshold: 3.0
  minDataPoints: 10

forecast:
  enabled: true
  horizonDays: 7
  minConfidence: 0.5

# =============================================
# PostgreSQL (Bitnami subchart)
# enabled: true  → Helm ile otomatik kur
# enabled: false → externalDatabase ile harici DB kullan
# =============================================
postgresql:
  enabled: true

  image:
    tag: latest # Sabit — her kurulumda manuel geçmeye gerek yok

  auth:
    username: kubepocket
    password: kubepocket
    database: kubepocket

  primary:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    persistence:
      enabled: true
      size: 10Gi

# Harici PostgreSQL (postgresql.enabled=false ise doldur)
externalDatabase:
  host: ""
  port: 5432
  username: kubepocket
  password: kubepocket
  database: kubepocket

service:
  apiPort: 8000
  metricsPort: 8001
  type: ClusterIP

resources:
  requests:
    memory: 512Mi
    cpu: 200m
  limits:
    memory: 1Gi
    cpu: 500m

nodeSelector: {}
tolerations: []
affinity: {}
podSecurityContext: {}
securityContext: {}

rbac:
  create: true
  extraRules: []

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
  metricRelabelings: []

# =============================================
# Monitoring entegrasyonu
#
# existingStack: false (varsayılan)
#   → install.sh, kube-prometheus-stack'i monitoring
#     namespace'ine kurar. Grafana + Prometheus dahil.
#
# existingStack: true
#   → Müşterinin mevcut Prometheus/Grafana stack'ine
#     entegre olur. Grafana + Prometheus kurulmaz.
#   - serviceMonitor.enabled: true yaparak ServiceMonitor'ı
#     müşterinin Prometheus'unun baktığı namespace'e koy
#   - grafanaDashboard.enabled: true yaparak dashboard'u
#     otomatik olarak Grafana'ya yükle (ConfigMap via sidecar)
# =============================================
monitoring:
  existingStack: false

  # Müşterinin Prometheus'unun namespace'i
  # ServiceMonitor bu namespace'e deploy edilir
  # (existingStack: true ise geçerli)
  namespace: "monitoring"

  # Grafana dashboard — ConfigMap olarak deploy edilir
  # Grafana sidecar (grafana.sidecar.dashboards.enabled=true)
  # ile otomatik yüklenir
  grafanaDashboard:
    enabled: false
    namespace: "monitoring" # Grafana'nın baktığı namespace
    folder: "KubePocket" # Grafana'da görünecek klasör adı

podDisruptionBudget:
  enabled: false
  minAvailable: 1

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

networkPolicy:
  enabled: false

podAnnotations: {}
podLabels: {}
priorityClassName: ""
terminationGracePeriodSeconds: 30
extraEnv: []
extraVolumes: []
extraVolumeMounts: []
watchNamespace: ""
